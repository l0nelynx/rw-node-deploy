- name: Create /opt/remnanode directory
  file:
    path: /opt/remnanode
    state: directory
    mode: '0755'

- name: Get pubKey from API
  uri:
    url: "{{ rw_endpoint }}/api/keygen"
    method: GET
    headers:
      Authorization: "Bearer {{ rw_token }}"
    return_content: true
  register: keygen_response

- name: Set pub_key fact
  set_fact:
    pub_key: "{{ keygen_response.json.response.pubKey }}"

- name: Fetch inbounds for config profile
  uri:
    url: "{{ rw_endpoint }}/api/config-profiles/{{ rw_config_uuid }}/inbounds"
    method: GET
    headers:
      Authorization: "Bearer {{ rw_token }}"
    return_content: true
  register: inbounds_response

- name: Build activeInbounds UUID list
  set_fact:
    rw_active_inbounds: >-
      {{
        inbounds_response.json.response.inbounds
        | selectattr('tag', 'in', rw_inbounds | default([]))
        | map(attribute='uuid')
        | list
        if (rw_inbounds | default([]) | length > 0)
        else (inbounds_response.json.response.inbounds | map(attribute='uuid') | list)
      }}

- name: Generate docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: /opt/remnanode/docker-compose.yml
    mode: '0644'

- name: Fetch existing nodes
  uri:
    url: "{{ rw_endpoint }}/api/nodes"
    method: GET
    headers:
      Authorization: "Bearer {{ rw_token }}"
    return_content: true
  register: nodes_response

- name: Check if node already registered
  set_fact:
    node_already_exists: >-
      {{
        nodes_response.json.response
        | selectattr('name', 'equalto', inventory_hostname)
        | list | length > 0
      }}

- name: Register node via API
  uri:
    url: "{{ rw_endpoint }}/api/nodes"
    method: POST
    headers:
      Content-Type: application/json
      Authorization: "Bearer {{ rw_token }}"
    body_format: json
    body:
      name: "{{ inventory_hostname }}"
      address: "{{ ansible_host }}"
      port: 2222
      isTrafficTrackingActive: false
      trafficLimitBytes: 0
      notifyPercent: 0
      trafficResetDay: 1
      countryCode: "XX"
      consumptionMultiplier: 0
      configProfile:
        activeConfigProfileUuid: "{{ rw_config_uuid }}"
        activeInbounds: "{{ rw_active_inbounds }}"
      providerUuid: null
      tags: []
      activePluginUuid: null
    status_code: [200, 201]
  register: node_response
  when: not node_already_exists

- name: Start Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/remnanode
    state: present